<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Virtual Interview Practice</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{
background:linear-gradient(135deg,#0f172a,#1e293b);
color:#fff;
min-height:100vh;
display:flex;
flex-direction: column;
justify-content:center;
align-items:center;
padding:20px;
}

/* Main Heading Title Style at the top of the screen */
.main-title {
text-align: center;
font-size: 36px;
font-weight: bold;
margin-bottom: 30px;
color: #f8fafc;
text-shadow: 0 2px 4px rgba(0,0,0,0.3);
}

.wrapper{
width:100%;
max-width:1000px;
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-bottom: 40px; /* Leave space for the footer */
}

.box{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(10px);
padding:20px;
border-radius:20px;
position:relative;
display: flex;
flex-direction: column;
}

h2{
text-align:center;
margin-bottom:10px;
font-size:24px;
color: #e2e8f0;
}

#question{
font-size:20px;
margin:20px 0;
min-height:80px;
}

.timers{
margin:10px 0;
font-size:16px;
color:#93c5fd;
}

/* Score display styled to blend perfectly with the timers */
.score-display-text {
margin-top: 15px;
font-size: 18px;
font-weight: bold;
color: #f43f5e; /* Elegant pinkish-red for score prominence */
display: none; /* Only shows when feedback is clicked */
}

.controls{
position:absolute;
bottom:15px;
right:15px;
display:flex;
gap:10px;
}

button{
padding:10px 12px;
border:none;
border-radius:10px;
cursor:pointer;
background:#2563eb;
color:#fff;
font-size:14px;
font-weight: bold;
}

button:hover{opacity:0.8}

video{
width:100%;
border-radius:15px;
margin-top:10px;
background: #000;
height: 220px;
}

.audio-visualizer{
display:flex;
justify-content:center;
align-items:flex-end;
height:60px;
gap:4px;
margin-top:15px;
margin-bottom: 40px;
}

.bar{
width:6px;
height:15px;
background:#22d3ee;
border-radius:5px;
transition: height 0.1s ease;
}

/* STYLISH GREEN FEEDBACK BUTTON UNDER PLAYER */
.feedback-btn {
background: #10b981;
margin-top: 15px;
width: 100%;
padding: 12px;
font-size: 16px;
border-radius: 12px;
display: none; /* Only reveals when recording stops */
text-align: center;
}

/* CUSTOM CREDIT FOOTER STYLING */
.footer {
text-align: center;
font-size: 14px;
color: #94a3b8;
margin-top: 10px;
}
.footer a {
color: #38bdf8;
text-decoration: none;
font-weight: bold;
}
.footer a:hover {
text-decoration: underline;
}

</style>
</head>
<body>

<h1 class="main-title">Virtual Interview Practice</h1>

<div class="wrapper">

<div class="box">
<h2>UKVI Interview Question</h2>

<div id="question">Click Next to Start</div>

<div class="timers">
<div>Speak In: <span id="aiTimer">0</span></div>
<div>Preparation Time: <span id="recTimer">0</span></div>
<div>Speaking Time: <span id="liveTime">0:00</span></div>
<div id="scoreRow" class="score-display-text">Interview Score: <span id="scoreValue">--/10</span></div>
</div>

<div class="audio-visualizer" id="visualizer">
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
</div>

<div class="controls">
<button onclick="nextFlow()">Next</button>
<button onclick="stopAll()">Stop</button>
</div>

</div>

<div class="box">
<h2>Camera View</h2>
<video id="preview" autoplay muted playsinline></video>
<video id="recorded" controls></video>
<button id="feedbackBtn" class="feedback-btn" onclick="generateFeedback()">Get Feedback & Score 🤖</button>
</div>

</div>

<div class="footer">
© 2026 | Designed & Coded by <a href="https://github.com/" target="_blank">Ashikur Rahman</a>
</div>

<script>

const questions=[
"Tell me about yourself",
"Why do you want to study in the UK?",
"Why this university?",
"What is your future goals?",
"Which other countries did you consider to pursue higher studies other than UK and which factors helped you choose UK over other countries?",
"Describe about your hometown",
"Describe about your strengths and weaknesses",
"Why should we accept you?",
"Tell about your study experience",
"What are the benefits of studying in the UK compared to your home country?",
"Why did you choose to study this course? ",
"How this course is relevant to your previous study, work experience and career aspiration?",
"How do you think this course will help you in your future career?",
"How do you think your previous study and work experience will help you in this course?",
"What are the modules you will be taught in this course? How you will be assessed?",
"What is your future plan and how this course will help you reach your career goal?",
"What is the course start date and end date?",
"Have you ever been to the UK? If yes, tell us about your experience. If no, why do you want to go to the UK?",
"How much is the tuition fee for this programme? Have you paid your tuition fee?",
"How much is your living cost in the UK? How do you plan to support yourself financially during your studies?",
"Do you have any family members or relatives in the UK? If yes, tell us about them and their status in the UK. If no, how do you plan to adapt to the new environment and culture in the UK?",
"Have you ever been refused a visa to the UK or any country? If yes, tell us about the circumstances and reasons for the refusal. If no, how do you plan to ensure that your visa application is successful?",
"Do you have any questions for us?",
"Why did you choose to study at this university? What do you know about the university, location, about the city and county, the campus and the facilities?",
"Which other universities did you consider? And which factors helped you choose this university over others?",
"What is your accommodation arrangement, and how much will it cost? How would you travel to your university from the place you will be staying in?",
"Do you have any plan to work in the UK? Are you aware of the UKVI guidance on working rights for the international students?",
"Explanation of study gap in detail.",
"Work experience: job responsibilities in detail.",
"Name of your previous university's dean, head of department, vice chancellor!",
"What are your hobbies and interests? How do you spend your leisure time?",
"How do you plan to contribute to the university community and student life?",
"How do you plan to contribute to the university community and student life?",
"Modules studied in the UG and PG studies.",
"Details of dependents: their profession etc.",
"How do you plan to adapt to the new environment and culture in the UK?",
"Have you ever been refused a visa to the UK or any country? If yes, tell us about the circumstances and reasons for the refusal. If no, how do you plan to ensure that your visa application is successful?",
"Your role model: name a person who inspires you and why."
];

let current="";
let stream;
let recorder;
let chunks=[];
let aiT, recT, liveT, visualLoop;
let audioContext, analyser, dataArray;
let totalRecordedSeconds = 0; 

// Hidden Speech Transcriber variables
let recognition;
let transcribedSpeech = "";

window.addEventListener('DOMContentLoaded', () => {
    if (window.location.protocol === 'file:') {
        alert("⚠️ ENVIRONMENT ERROR: You opened this file by double-clicking it from a folder. Web browsers block webcam recordings on local file:/// links. You MUST host this on GitHub Pages or use a local web server (like VS Code Live Server) for the recording to work!");
    }
    startCamera();
    initSpeechRecognition();
});

function initSpeechRecognition() {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SpeechRecognition) {
        recognition = new SpeechRecognition();
        recognition.continuous = true;
        recognition.interimResults = false;
        recognition.lang = 'en-US';

        recognition.onresult = (event) => {
            let currentResultIndex = event.resultIndex;
            let text = event.results[currentResultIndex][0].transcript;
            transcribedSpeech += text + " ";
        };
    }
}

async function startCamera(){
    try {
        stream = await navigator.mediaDevices.getUserMedia({video:true, audio:true});
        document.getElementById("preview").srcObject = stream;
        setupVisualizer(stream);
    } catch (err) {
        console.error("Camera/Mic access denied:", err);
        alert("❌ PERMISSION ERROR: The system cannot access your camera or microphone. Please click the icon next to your URL search bar and set Camera and Microphone to 'Allow', then refresh.");
        document.getElementById("question").innerText = "Please clear browser permission blocks to reveal camera streams.";
    }
}

function playBeep() {
    try {
        const ctx = audioContext || new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = ctx.createOscillator();
        const gainNode = ctx.createGain();
        
        oscillator.type = 'sine';
        oscillator.frequency.value = 600; 
        
        gainNode.gain.setValueAtTime(0.15, ctx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3); 
        
        oscillator.connect(gainNode);
        gainNode.connect(ctx.destination);
        
        oscillator.start();
        oscillator.stop(ctx.currentTime + 0.3); 
    } catch (e) {
        console.error("Audio beep generation failed:", e);
    }
}

function formatTime(totalSeconds) {
    const minutes = Math.floor(totalSeconds / 60);
    const seconds = totalSeconds % 60;
    return minutes + ":" + (seconds < 10 ? "0" : "") + seconds;
}

function speak(text){
    window.speechSynthesis.cancel(); 
    let s = new SpeechSynthesisUtterance(text);
    s.rate = 1.0; 
    window.speechSynthesis.speak(s);
    return new Promise(r => { s.onend = r; });
}

function timer(id, sec, cb){
    let timerId = id == "ai" ? "aiTimer" : "recTimer";
    clearInterval(window[id + "T"]);
    document.getElementById(timerId).innerText = sec;
    
    window[id + "T"] = setInterval(() => {
        sec--;
        document.getElementById(timerId).innerText = sec;
        if(sec <= 0){
            clearInterval(window[id + "T"]);
            if(cb) cb();
        }
    }, 1000);
}

function startRecord(){
    if (!stream) {
        alert("Cannot record: Camera stream missing.");
        return;
    }
    
    playBeep();
    
    recorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
    chunks = [];
    
    transcribedSpeech = "";
    if (recognition) {
        try { recognition.start(); } catch(e){}
    }
    
    recorder.ondataavailable = e => {
        if (e.data && e.data.size > 0) {
            chunks.push(e.data);
        }
    };
    
    recorder.onstop = () => {
        if (chunks.length === 0) {
            alert("Error: Zero video data captured.");
            return;
        }

        let blob = new Blob(chunks, {type: "video/webm"});
        let videoURL = URL.createObjectURL(blob);
        
        let recordedVideo = document.getElementById("recorded");
        recordedVideo.src = videoURL;
        recordedVideo.load();
        
        if (totalRecordedSeconds > 0) {
            recordedVideo.addEventListener('loadedmetadata', function() {
                Object.defineProperty(recordedVideo, 'duration', {
                    value: totalRecordedSeconds,
                    configurable: true
                });
            }, { once: true });
        }

        // Display Green score button right below video player panel
        document.getElementById("feedbackBtn").style.display = "block";
    };
    
    recorder.start();
}

function setupVisualizer(mediaStream) {
    if (audioContext) audioContext.close();
    
    audioContext = new (window.AudioContext || window.webkitAudioContext)();
    const source = audioContext.createMediaStreamSource(mediaStream);
    analyser = audioContext.createAnalyser();
    analyser.fftSize = 32; 
    source.connect(analyser);
    
    const bufferLength = analyser.frequencyBinCount;
    dataArray = new Uint8Array(bufferLength);
    const bars = document.querySelectorAll('.bar');

    function draw() {
        visualLoop = requestAnimationFrame(draw);
        analyser.getByteFrequencyData(dataArray);
        
        bars.forEach((bar, index) => {
            let value = dataArray[index] || 0;
            let height = Math.max(15, (value / 255) * 60); 
            bar.style.height = height + 'px';
        });
    }
    draw();
}

async function nextFlow(){
    let recordedVideo = document.getElementById("recorded");
    recordedVideo.pause(); 
    recordedVideo.src = ""; 
    
    // Clean scoring visual states
    document.getElementById("feedbackBtn").style.display = "none";
    document.getElementById("scoreRow").style.display = "none";
    document.getElementById("scoreValue").innerText = "--/10";
    
    if(recorder && recorder.state != "inactive") recorder.stop();
    if(recognition) { try { recognition.stop(); } catch(e){} }

    clearInterval(liveT);
    totalRecordedSeconds = 0;
    document.getElementById("liveTime").innerText = "0:00"; 
    document.getElementById("recTimer").innerText = "0";

    current = questions[Math.floor(Math.random() * questions.length)];
    document.getElementById("question").innerText = current;

    let aiCount = 3;
    timer("ai", aiCount, async () => {
        await speak(current);

        let recCount = 3;
        timer("rec", recCount, () => {
            startRecord();
            startLiveTimer();
        });
    });
}

function startLiveTimer(){
    clearInterval(liveT);
    let live = 0;
    liveT = setInterval(() => {
        live++;
        totalRecordedSeconds = live; 
        document.getElementById("liveTime").innerText = formatTime(live); 
    }, 1000);
}

function stopAll(){
    if(recorder && recorder.state != "inactive") {
        recorder.stop();
    }
    if (recognition) { try { recognition.stop(); } catch(e){} }
    clearInterval(aiT);
    clearInterval(recT);
    clearInterval(liveT);
}

// SIMPLIFIED IMMEDIATE FEEDBACK PROCESSING
async function generateFeedback() {
    if (recognition) { try { recognition.stop(); } catch(e){} }

    let safeText = transcribedSpeech.trim();
    
    // Reveal score line immediately on the screen
    document.getElementById("scoreRow").style.display = "block";
    document.getElementById("scoreValue").innerText = "Calculating...";

    // If Chrome Built-in Local AI Engine is active
    if (window.ai && window.ai.createTextSession) {
        try {
            const session = await window.ai.createTextSession();
            const rawPrompt = `Review this speech answer out of 10 for a UKVI Interview.
            Question: "${current}"
            Answer given: "${safeText}"
            Return ONLY the final number grade score like "8/10". Do not write any other letters or sentences.`;
            
            const aiResponse = await session.prompt(rawPrompt);
            let scoreMatch = aiResponse.match(/(\d+)\s*\/\s*10/) || aiResponse.match(/\b([1-9]|10)\b/);
            let finalScore = scoreMatch ? `${scoreMatch[1]}/10` : "8/10";
            
            document.getElementById("scoreValue").innerText = finalScore;
            return;
        } catch(aiError) {
            console.error("Local window.ai crashed:", aiError);
        }
    }

    // Dynamic smart grading calculation if local Chrome AI isn't turned on yet 
    // This looks at answer duration and key metrics to assign a realistic mock score immediately!
    setTimeout(() => {
        let calculationWordWeight = safeText.split(" ").length;
        let finalGrade = 6; // base grade
        
        if (calculationWordWeight > 25) finalGrade += 1;
        if (calculationWordWeight > 50) finalGrade += 1;
        if (totalRecordedSeconds > 20 && totalRecordedSeconds < 90) finalGrade += 1;
        if (safeText.toLowerCase().includes("study") || safeText.toLowerCase().includes("uk")) finalGrade += 1;
        if (finalGrade > 10) finalGrade = 10;
        
        document.getElementById("scoreValue").innerText = `${finalGrade}/10`;
    }, 800);
}

</script>
</body>
</html>
