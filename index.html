<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Virtual Interview Practice</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{
background:linear-gradient(135deg,#0f172a,#1e293b);
color:#fff;
min-height:100vh;
display:flex;
flex-direction: column;
justify-content:center;
align-items:center;
padding:20px;
}

/* Main Heading Title Style at the top of the screen */
.main-title {
text-align: center;
font-size: 36px;
font-weight: bold;
margin-bottom: 30px;
color: #f8fafc;
text-shadow: 0 2px 4px rgba(0,0,0,0.3);
}

.wrapper{
width:100%;
max-width:1000px;
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-bottom: 40px; 
}

.box{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(10px);
padding:20px;
border-radius:20px;
position:relative;
display: flex;
flex-direction: column;
}

h2{
text-align:center;
margin-bottom:10px;
font-size:24px;
color: #e2e8f0;
}

#question{
font-size:20px;
margin:20px 0;
min-height:80px;
}

.timers{
margin:10px 0;
font-size:16px;
color:#93c5fd;
display: flex;
flex-direction: column;
gap: 4px;
}

/* PREMIUM NEW SCOREBOARD BOX DESIGN */
.score-container-box {
margin: 20px 0;
background: rgba(15, 23, 42, 0.6);
border: 2px solid #38bdf8; /* Dynamically colored by JavaScript */
padding: 14px 20px;
border-radius: 12px;
display: none; /* Keeps hidden until 'Get Feedback' is clicked */
align-items: center;
justify-content: space-between;
box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
transition: all 0.3s ease-in-out;
}

.score-label-text {
font-size: 16px;
font-weight: bold;
color: #ffffff;
letter-spacing: 0.5px;
}

.score-numerical-badge {
font-size: 24px;
font-weight: 900;
color: #38bdf8; /* Dynamically colored by JavaScript */
text-shadow: 0 0 10px rgba(56, 189, 248, 0.2);
margin-left: 5px;
}

#scoreStatus {
font-size: 13px;
font-weight: bold;
padding: 6px 12px;
border-radius: 8px;
text-transform: uppercase;
letter-spacing: 0.5px;
border: 1px solid transparent;
display: inline-block;
transition: all 0.3s ease;
}

.controls{
position:absolute;
bottom:15px;
right:15px;
display:flex;
gap:10px;
}

button{
padding:10px 12px;
border:none;
border-radius:10px;
cursor:pointer;
background:#2563eb;
color:#fff;
font-size:14px;
font-weight: bold;
}

button:hover{opacity:0.8}

video{
width:100%;
border-radius:15px;
margin-top:10px;
background: #000;
height: 220px;
}

.audio-visualizer{
display:flex;
justify-content:center;
align-items:flex-end;
height:60px;
gap:4px;
margin-top:15px;
margin-bottom: 15px;
}

.bar{
width:6px;
height:15px;
background:#22d3ee;
border-radius:5px;
transition: height 0.08s ease; 
}

/* EXPECTED ANSWER CONTAINER STYLE */
.expected-answer-box {
background: rgba(15, 23, 42, 0.4);
border: 1px dashed #38bdf8;
border-radius: 12px;
padding: 12px;
margin-top: 15px;
margin-bottom: 50px; 
font-size: 14px;
line-height: 1.4;
color: #cbd5e1;
display: none;
}

/* STYLISH GREEN FEEDBACK BUTTON UNDER PLAYER */
.feedback-btn {
background: #10b981;
margin-top: 15px;
width: 100%;
padding: 12px;
font-size: 16px;
border-radius: 12px;
display: none; 
text-align: center;
}

/* CUSTOM CREDIT FOOTER STYLING */
.footer {
text-align: center;
font-size: 14px;
color: #94a3b8;
margin-top: 10px;
}
.footer a {
color: #38bdf8;
text-decoration: none;
font-weight: bold;
}
.footer a:hover {
text-decoration: underline;
}

</style>
</head>
<body>

<h1 class="main-title">Virtual Interview Practice</h1>

<div class="wrapper">

<div class="box">
<h2>UKVI Interview Question</h2>

<div id="question">Click Next to Start</div>

<div class="timers">
<div>Speak In: <span id="aiTimer">0</span></div>
<div>Preparation Time: <span id="recTimer">0</span></div>
<div>Speaking Time: <span id="liveTime">0:00</span></div>
</div>

<div id="scoreContainer" class="score-container-box">
  <div>
    <span class="score-label-text">Interview Score:</span>
    <span id="scoreValue" class="score-numerical-badge">--/10</span>
  </div>
  <div>
    <span id="scoreStatus"></span>
  </div>
</div>

<div class="audio-visualizer" id="visualizer">
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
</div>

<div id="expectedAnswerBox" class="expected-answer-box"></div>

<div class="controls">
<button id="hintBtn" style="background: #0284c7; display: none;" onclick="toggleExpectedAnswer()">Expected Answer 💡</button>
<button onclick="nextFlow()">Next</button>
<button onclick="stopAll()">Stop</button>
</div>

</div>

<div class="box">
<h2>Camera View</h2>
<video id="preview" autoplay muted playsinline></video>
<video id="recorded" controls></video>
<button id="feedbackBtn" class="feedback-btn" onclick="generateFeedback()">Get Feedback & Score 🤖</button>
</div>

</div>

<div class="footer">
© 2026 | Designed & Coded by <a href="https://github.com/" target="_blank">Ashikur Rahman</a>
</div>

<script>

const interviewData = [
  {
    question: "Tell me about yourself",
    keywords: ["name", "background", "qualification", "completed", "graduated", "bachelor", "work", "experience", "passport"],
    hint: "State your name clearly, your recent academic qualifications, any relevant work experience, and state why you are moving into this next academic level."
  },
  {
    question: "Why do you want to study in the UK?",
    keywords: ["uk", "united kingdom", "education system", "global", "recognized", "quality", "duration", "standard", "reputation", "english"],
    hint: "Focus on the short course duration (e.g., 1-year Master's), globally recognized degrees, world-class teaching standards, and the safe multicultural student environment."
  },
  {
    question: "Why this university?",
    keywords: ["university", "ranking", "facilities", "location", "campus", "professor", "modules", "satisfaction", "reputation", "services"],
    hint: "Mention specific facts: student satisfaction rate, modern lab/library facilities, practical course structure, campus location, or awards won by the institution."
  },
  {
    question: "What is your future goals?",
    keywords: ["future", "goals", "career", "long-term", "short-term", "return", "manager", "executive", "position", "company", "industry"],
    hint: "Be explicit! State your immediate position upon return to your home country (e.g., Senior Software Engineer) and name major domestic companies you want to join."
  },
  {
    question: "Which other countries did you consider to pursue higher studies other than UK and which factors helped you choose UK over other countries?",
    keywords: ["considered", "compared", "canada", "australia", "usa", "duration", "cost", "visa", "expensive", "shorter"],
    hint: "Explain that countries like Canada or the USA take 2 years for a Master's, making tuition and living expenses double compared to a 1-year degree in the UK."
  },
  {
    question: "Describe about your hometown",
    keywords: ["hometown", "city", "located", "famous", "population", "culture", "capital", "district", "history"],
    hint: "Give a 2-3 sentence clear description of your home city/district, its geographical location, and what it is widely known for commercially or culturally."
  },
  {
    question: "Describe about your strengths and weaknesses",
    keywords: ["strength", "weakness", "focus", "time management", "learn", "improve", "organized", "deadline", "example"],
    hint: "State a strength helpful for a student (e.g., strong research skills) and share a real weakness that you are actively improving (e.g., getting nervous presenting)."
  },
  {
    question: "Why should we accept you?",
    keywords: ["accept", "eligible", "requirement", "gpa", "background", "motivated", "contribute", "student", "skills"],
    hint: "Explain how your academic background directly fulfills the entry requirements of this course and express your high dedication to study hard."
  },
  {
    question: "Tell about your study experience",
    keywords: ["study", "experience", "university", "college", "gpa", "passed", "subjects", "thesis", "project", "major"],
    hint: "Summarize your previous degree, the passing year, institute name, major subjects studied, and grade point average or division achieved."
  },
  {
    question: "What are the benefits of studying in the UK compared to your home country?",
    keywords: ["benefits", "compare", "home country", "practical", "research", "exposure", "global", "updated", "methods"],
    hint: "Explain that education in your home country is highly theoretical, whereas the UK focuses on advanced practical applications and independent research styles."
  },
  {
    question: "Why did you choose to study this course? ",
    keywords: ["choose", "course", "interest", "modules", "career", "skills", "knowledge", "demand", "profession"],
    hint: "Explain your passion for the subject matter and how the knowledge gained matches current job market demands in your sector."
  },
  {
    question: "How this course is relevant to your previous study, work experience and career aspiration?",
    keywords: ["relevant", "previous", "link", "connection", "advanced", "progression", "bridge", "step", "aspiration"],
    hint: "Demonstrate academic progression. Show how this program acts as an advanced next step or deepens the core concepts you built in your Bachelor's."
  },
  {
    question: "How do you think this course will help you in your future career?",
    keywords: ["help", "career", "promotion", "salary", "skills", "managerial", "leadership", "qualify", "roles"],
    hint: "Mention specific professional tools or leadership skill sets from the syllabus that will qualify you for higher management tiers and competitive salary scales."
  },
  {
    question: "How do you think your previous study and work experience will help you in this course?",
    keywords: ["experience", "knowledge", "foundation", "concepts", "understand", "background", "assignments"],
    hint: "Explain how knowing the fundamental concepts from your bachelor's degree or practical office hours means you can comfortably analyze complex master-level papers."
  },
  {
    question: "What are the modules you will be taught in this course? How you will be assessed?",
    keywords: ["modules", "core", "optional", "credits", "assessment", "exam", "assignment", "dissertation", "presentation"],
    hint: "Name at least 3-4 specific modules of your program. State the assessment style, such as individual essays, group projects, exams, or a final dissertation."
  },
  {
    question: "What is your future plan and how this course will help you reach your career goal?",
    keywords: ["plan", "goal", "target", "company", "return", "apply", "knowledge", "position", "growth"],
    hint: "Reiterate your definitive career goal, confirming your immediate plan to return home to apply this standard of learning inside your local economy."
  },
  {
    question: "What is the course start date and end date?",
    keywords: ["start", "end", "date", "intake", "september", "january", "months", "year", "duration"],
    hint: "Provide the exact month and year of your entry intake and the official expected completion date as listed on your offer letter/CAS."
  },
  {
    question: "Have you ever been to the UK? If yes, tell us about your experience. If no, why do you want to go to the UK?",
    keywords: ["been", "visited", "travel", "first time", "exposure", "study", "purpose", "never"],
    hint: "Answer directly. If no, state it's your first time traveling there, driven purely by your intention to acquire higher international education."
  },
  {
    question: "How much is the tuition fee for this programme? Have you paid your tuition fee?",
    keywords: ["tuition", "fee", "fees", "pounds", "paid", "amount", "deposit", "scholarship", "receipt"],
    hint: "State the total annual tuition fee in British Pounds (£). Confirm how much deposit you have already paid and the remaining balance amount."
  },
  {
    question: "How much is your living cost in the UK? How do you plan to support yourself financially during your studies?",
    keywords: ["living", "cost", "funds", "bank", "statement", "maintenance", "london", "outer", "parents", "sponsor"],
    hint: "Quote official UKVI maintenance figures: £1,483/month (Inner London) or £1,136/month (Outer London). Mention who your financial sponsor is."
  },
  {
    question: "Do you have any family members or relatives in the UK? If yes, tell us about them and their status in the UK. If no, how do you plan to adapt to the new environment and culture in the UK?",
    keywords: ["relatives", "family", "no", "adapt", "accommodation", "student services", "support", "friends", "culture"],
    hint: "Be completely honest. If no relatives, explain that you will live in student housing, join university orientation weeks, and use campus international support teams to settle."
  },
  {
    question: "Have you ever been refused a visa to the UK or any country? If yes, tell us about the circumstances and reasons for the refusal. If no, how do you plan to ensure that your visa application is successful?",
    keywords: ["refused", "refusal", "rejection", "never", "declined", "documents", "genuine", "cas", "guidelines"],
    hint: "Never hide a refusal! If no, explain that you will ensure success by presenting accurate bank accounts, verified academic files, and showing genuine student intent."
  },
  {
    question: "Do you have any questions for us?",
    keywords: ["questions", "thank you", "support", "clubs", "societies", "induction", "enrolment"],
    hint: "Politely ask a specific academic question, such as: 'What support mechanisms are available for international students during the first week of enrollment?'"
  },
  {
    question: "Why did you choose to study at this university? What do you know about the university, location, about the city and county, the campus and the facilities?",
    keywords: ["city", "location", "facilities", "campus", "library", "labs", "county", "england", "scotland", "wales"],
    hint: "Detail the exact city location of the campus. Mention transport networks near it and specific campus assets like 24/7 learning grids or specialized career centers."
  },
  {
    question: "Which other universities did you consider? And which factors helped you choose this university over others?",
    keywords: ["compared", "universities", "ranking", "modules", "fees", "cheaper", "structure", "reputation"],
    hint: "Name 2 other specific UK universities you researched. Explain that your chosen university won because its module distribution matches your exact target goals or offers better values."
  },
  {
    question: "What is your accommodation arrangement, and how much will it cost? How would you travel to your university from the place you will be staying in?",
    keywords: ["accommodation", "hall", "rent", "pounds", "walk", "bus", "train", "distance", "minutes"],
    hint: "State whether you are staying in university halls or private student accommodation, the monthly/weekly rental budget, and how you will commute (e.g., 10-minute walk)."
  },
  {
    question: "Do you have any plan to work in the UK? Are you aware of the UKVI guidance on working rights for the international students?",
    keywords: ["work", "hours", "part-time", "guidance", "rules", "20 hours", "term-time", "holidays", "legal"],
    hint: "Confirm you are fully aware: international student rules permit a maximum of 20 hours per week part-time during term-time, and full-time only during official vacations."
  },
  {
    question: "Explanation of study gap in detail.",
    keywords: ["gap", "years", "working", "job", "experience", "gained", "skills", "reason", "certificate"],
    hint: "Explain exactly what you did during any gaps between studies—provide firm job titles, project assignments, or technical certifications to prove you remained productive."
  },
  {
    question: "Work experience: job responsibilities in detail.",
    keywords: ["responsibilities", "role", "duties", "company", "worked", "managed", "skills", "experience"],
    hint: "Outline your day-to-day duties clearly (e.g., handling client data, managing code bases), connecting them to the advanced skills taught in your chosen UK program."
  },
  {
    question: "Name of your previous university's dean, head of department, vice chancellor!",
    keywords: ["dean", "head", "department", "chancellor", "professor", "name", "previous", "university"],
    hint: "Have the precise names of key figures from your old university memorized to easily verify your academic history under pressure."
  },
  {
    question: "What are your hobbies and interests? How do you spend your leisure time?",
    keywords: ["hobbies", "interests", "leisure", "reading", "sports", "cricket", "football", "traveling", "relax"],
    hint: "Briefly share a constructive personal activity (such as reading journals, participating in sports, coding) that shows you maintain a balanced lifestyle."
  },
  {
    question: "How do you plan to contribute to the university community and student life?",
    keywords: ["contribute", "community", "societies", "clubs", "volunteer", "student union", "ambassador", "events"],
    hint: "Talk about joining student clubs, acting as a student ambassador, participating in international food festivals, or volunteering in campus events."
  },
  {
    question: "Modules studied in the UG and PG studies.",
    keywords: ["undergraduate", "postgraduate", "modules", "subjects", "bsc", "bba", "passed", "studied"],
    hint: "List the core subjects from your previous graduation that laid the framework for the specialized program you are about to start in the UK."
  },
  {
    question: "Details of dependents: their profession etc.",
    keywords: ["dependents", "spouse", "wife", "husband", "children", "profession", "job", "funds"],
    hint: "If applying with family, state their accurate professions and confirm you hold the extra maintenance funds to support them without public funding."
  },
  {
    question: "Your role model: name a person who inspires you and why.",
    keywords: ["role model", "inspires", "inspiration", "because", "achieved", "leader", "profession", "father", "scientist"],
    hint: "Name a visionary in your field or family, highlighting qualities like resilience, technical expertise, or ethics that drive you to study abroad."
  },
  {
    question: "What is your full name?",
    keywords: ["name", "called", "full name", "passport", "first name", "last name"],
    hint: "State your full legal name clearly as it appears on your passport, including first name and surname."
  },
  {
    question: "Where are you from?",
    keywords: ["from", "bangladesh", "dhaka", "city", "country", "born", "hometown"],
    hint: "Mention your home country (Bangladesh) and name the specific city or district where you currently live."
  },
  {
    question: "What did you study before?",
    keywords: ["study", "before", "hsc", "ssc", "bachelor", "degree", "completed", "major", "graduation"],
    hint: "State your most recently completed degree (e.g., Bachelor, HSC), major subjects studied, and the name of your institute."
  },
  {
    question: "What are you doing currently?",
    keywords: ["currently", "now", "doing", "job", "working", "preparing", "completing", "internship"],
    hint: "Explain your present daily activities, such as working a specific role, preparing visa files, or taking technical training courses."
  },
  {
    question: "Are you working now?",
    keywords: ["working", "now", "job", "employment", "company", "position", "role"],
    hint: "Answer directly. If yes, state your job title and company name. If no, specify that you are currently a full-time student preparing for higher studies."
  },
  {
    question: "What are your hobbies?",
    keywords: ["hobbies", "hobby", "leisure", "free time", "reading", "sports", "gardening"],
    hint: "Mention 1-2 productive activities you enjoy in your free time that highlight a balanced and active lifestyle."
  },
  {
    question: "Why do you want to study abroad?",
    keywords: ["abroad", "international", "exposure", "global", "standards", "quality", "career"],
    hint: "Focus on obtaining global exposure, learning advanced practical concepts, and securing high-value qualifications respected worldwide."
  },
  {
    question: "Why not study in Bangladesh?",
    keywords: ["bangladesh", "theoretical", "session jam", "traditional", "curriculum", "practical", "facilities"],
    hint: "Point out that higher education in Bangladesh is highly theoretical, can suffer from session jams, and lacks the advanced practical industry links found abroad."
  },
  {
    question: "Why do you want to continue higher education now?",
    keywords: ["higher education", "now", "advance", "career", "skills", "knowledge", "growth"],
    hint: "Explain that to step up in your career tier or gain specialized knowledge, a standard bachelor's degree is no longer sufficient in the current job market."
  },
  {
    question: "Why did you choose this university?",
    keywords: ["university", "ranking", "facilities", "modules", "satisfaction", "reputation"],
    hint: "Highlight specific reasons like excellent student satisfaction metrics, career employment services, or high modern facility ratings."
  },
  {
    question: "How did you find this university?",

  },
  {
    question: "Did anyone recommend this university?",
    keywords: ["recommend", "suggestion", "friend", "teacher", "alumni", "relative"],

  },
  {
    question: "How many universities did you apply to?",

  },
  {
    question: "Which universities did you receive offers from?",
    keywords: ["offers", "received", "conditional", "unconditional", "admission"],
    hint: "List the names of all the UK universities that issued you offer letters alongside your chosen institution."
  },
  {
    question: "Why did you reject other universities?",

  },
  {
    question: "What ranking does your university have?",

  },
  {
    question: "What do you know about the university?",

  {

  {

  {

  },

  {
    question: "What course will you study?",

  },
  {
    question: "Why did you choose this course?",

  },
  {
    question: "Why this subject?",

  },

    question: "What will you learn from this course?",

  },
  {
    question: "What are the modules?",

  {

    keywords: ["like", "most", "favourite", "module", "particular"],

  {
    question: "How is this course related to your previous studies?",

  },
  {

let currentIndex = -1;
let stream;
let recorder;
let chunks=[];
let aiT, recT, liveT, visualLoop;
let audioContext, analyser, dataArray;
let totalRecordedSeconds = 0; 

let recognition;
let transcribedSpeech = "";
let isRecordingActive = false; 

window.addEventListener('DOMContentLoaded', () => {
    if (window.location.protocol === 'file:') {
        alert("⚠️ ENVIRONMENT ERROR: Web browsers block webcam recordings on local file links. Host on GitHub Pages for recording functionality.");
    }
    startCamera();
    initSpeechRecognition();
});

function initSpeechRecognition() {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SpeechRecognition) {
        recognition = new SpeechRecognition();
        recognition.continuous = true;
        recognition.interimResults = false;
        recognition.lang = 'en-US';

        recognition.onresult = (event) => {
            let currentResultIndex = event.resultIndex;
            let text = event.results[currentResultIndex][0].transcript;
            transcribedSpeech += text + " ";
        };
    }
}

async function startCamera(){
    try {
        stream = await navigator.mediaDevices.getUserMedia({video:true, audio:true});
        document.getElementById("preview").srcObject = stream;
        setupVisualizer(stream);
    } catch (err) {
        console.error("Access denied:", err);
        document.getElementById("question").innerText = "Camera/Mic error. Check system permissions.";
    }
}

function playBeep() {
    try {
        const ctx = audioContext || new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = ctx.createOscillator();
        const gainNode = ctx.createGain();
        oscillator.type = 'sine';
        oscillator.frequency.value = 600; 
        gainNode.gain.setValueAtTime(0.15, ctx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3); 
        oscillator.connect(gainNode);
        gainNode.connect(ctx.destination);
        oscillator.start();
        oscillator.stop(ctx.currentTime + 0.3); 
    } catch (e){}
}

function formatTime(totalSeconds) {
    const minutes = Math.floor(totalSeconds / 60);
    const seconds = totalSeconds % 60;
    return minutes + ":" + (seconds < 10 ? "0" : "") + seconds;
}

function speak(text){
    window.speechSynthesis.cancel(); 
    let s = new SpeechSynthesisUtterance(text);
    
    // Scan device OS for high-quality natural neural/google voices
    let voices = window.speechSynthesis.getVoices();
    
    // Preference order for natural sounding English engines
    let preferredVoice = voices.find(v => v.name.includes("Google US English") || v.name.includes("Natural") || v.name.includes("Aria") || v.name.includes("Samantha") || v.name.includes("Zira"));
    
    if(!preferredVoice) {
        preferredVoice = voices.find(v => v.lang.startsWith("en-") || v.lang.startsWith("en_"));
    }
    
    if(preferredVoice) {
        s.voice = preferredVoice;
    }

    s.rate = 0.95; // Slower human cadence
    s.pitch = 1.0; 
    window.speechSynthesis.speak(s);
    return new Promise(r => { s.onend = r; });
}

if (typeof speechSynthesis !== 'undefined' && speechSynthesis.onvoiceschanged !== undefined) {
    speechSynthesis.onvoiceschanged = () => { window.speechSynthesis.getVoices(); };
}

function timer(id, sec, cb){
    let timerId = id == "ai" ? "aiTimer" : "recTimer";
    clearInterval(window[id + "T"]);
    document.getElementById(timerId).innerText = sec;
    
    window[id + "T"] = setInterval(() => {
        sec--;
        document.getElementById(timerId).innerText = sec;
        if(sec <= 0){
            clearInterval(window[id + "T"]);
            if(cb) cb();
        }
    }, 1000);
}

function startRecord(){
    if (!stream) return;
    playBeep();
    
    recorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
    chunks = [];
    transcribedSpeech = "";
    isRecordingActive = true; 
    
    if (recognition) { try { recognition.start(); } catch(e){} }
    
    recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
    
    recorder.onstop = () => {
        isRecordingActive = false; 
        resetVisualizerBars();     
        
        let blob = new Blob(chunks, {type: "video/webm"});
        let recordedVideo = document.getElementById("recorded");
        recordedVideo.src = URL.createObjectURL(blob);
        recordedVideo.load();
        
        if (totalRecordedSeconds > 0) {
            recordedVideo.addEventListener('loadedmetadata', function() {
                Object.defineProperty(recordedVideo, 'duration', { value: totalRecordedSeconds, configurable: true });
            }, { once: true });
        }
        document.getElementById("feedbackBtn").style.display = "block";
    };
    recorder.start();
}

function setupVisualizer(mediaStream) {
    if (audioContext) audioContext.close();
    audioContext = new (window.AudioContext || window.webkitAudioContext)();
    const source = audioContext.createMediaStreamSource(mediaStream);
    analyser = audioContext.createAnalyser();
    analyser.fftSize = 32; 
    source.connect(analyser);
    
    const bufferLength = analyser.frequencyBinCount;
    dataArray = new Uint8Array(bufferLength);
    const bars = document.querySelectorAll('.bar');

    function draw() {
        visualLoop = requestAnimationFrame(draw);
        
        if (isRecordingActive) {
            analyser.getByteFrequencyData(dataArray);
            bars.forEach((bar, index) => {
                let value = dataArray[index] || 0;
                let height = Math.max(15, (value / 255) * 60); 
                bar.style.height = height + 'px';
            });
        }
    }
    draw();
}

function resetVisualizerBars() {
    const bars = document.querySelectorAll('.bar');
    bars.forEach(bar => { bar.style.height = '15px'; });
}

async function nextFlow(){
    let recordedVideo = document.getElementById("recorded");
    recordedVideo.pause(); 
    recordedVideo.src = ""; 
    
    document.getElementById("feedbackBtn").style.display = "none";
    
    let scoreBox = document.getElementById("scoreContainer");
    scoreBox.style.display = "none";
    scoreBox.style.borderColor = "#38bdf8";
    
    let scoreNum = document.getElementById("scoreValue");
    scoreNum.innerText = "--/10";
    scoreNum.style.color = "#38bdf8";
    scoreNum.style.textShadow = "0 0 10px rgba(56, 189, 248, 0.2)";
    
    let statusLabel = document.getElementById("scoreStatus");
    statusLabel.innerText = "";
    statusLabel.style.color = "#fff";
    statusLabel.style.backgroundColor = "transparent";
    statusLabel.style.borderColor = "transparent";

    document.getElementById("expectedAnswerBox").style.display = "none";
    document.getElementById("hintBtn").style.display = "inline-block";

    if(recorder && recorder.state != "inactive") recorder.stop();
    if(recognition) { try { recognition.stop(); } catch(e){} }

    clearInterval(liveT);
    totalRecordedSeconds = 0;
    document.getElementById("liveTime").innerText = "0:00"; 
    document.getElementById("recTimer").innerText = "0";

    currentIndex = Math.floor(Math.random() * interviewData.length);
    let targetData = interviewData[currentIndex];
    
    document.getElementById("question").innerText = targetData.question;
    document.getElementById("expectedAnswerBox").innerText = targetData.hint;

    let aiCount = 3;
    timer("ai", aiCount, async () => {
        await speak(targetData.question);
        let recCount = 3;
        timer("rec", recCount, () => {
            startRecord();
            startLiveTimer();
        });
    });
}

function startLiveTimer(){
    clearInterval(liveT);
    let live = 0;
    liveT = setInterval(() => {
        live++;
        totalRecordedSeconds = live; 
        document.getElementById("liveTime").innerText = formatTime(live); 
    }, 1000);
}

function toggleExpectedAnswer() {
    let box = document.getElementById("expectedAnswerBox");
    box.style.display = (box.style.display === "block") ? "none" : "block";
}

function stopAll(){
    if(recorder && recorder.state != "inactive") recorder.stop();
    if (recognition) { try { recognition.stop(); } catch(e){} }
    clearInterval(aiT); clearInterval(recT); clearInterval(liveT);
    isRecordingActive = false;
    resetVisualizerBars();
}

async function generateFeedback() {
    if (recognition) { try { recognition.stop(); } catch(e){} }

    let safeText = transcribedSpeech.trim().toLowerCase();
    
    let scoreBox = document.getElementById("scoreContainer");
    scoreBox.style.display = "flex"; 
    
    let scoreNum = document.getElementById("scoreValue");
    scoreNum.innerText = "Analyzing...";
    
    let statusElement = document.getElementById("scoreStatus");
    statusElement.innerText = "WAITING";
    statusElement.style.color = "#94a3b8";
    statusElement.style.backgroundColor = "rgba(255,255,255,0.05)";
    statusElement.style.borderColor = "rgba(255,255,255,0.1)";

    let currentQuestionData = interviewData[currentIndex];
    let targetKeywords = currentQuestionData ? currentQuestionData.keywords : [];

    setTimeout(() => {
        let totalWords = safeText.split(/\s+/).filter(w => w.length > 0).length;
        let matchedKeywordsCount = 0;

        targetKeywords.forEach(keyword => {
            if (safeText.includes(keyword)) {
                matchedKeywordsCount++;
            }
        });

        let fillerCount = 0;
        let wordsArray = safeText.split(/\s+/);
        wordsArray.forEach(word => {
            let cleanWord = word.replace(/[^a-zA-Z]/g, "");
            if (cleanWord === "umm" || cleanWord === "um" || cleanWord === "like") {
                fillerCount++;
            }
        });

        let matchesAnd = safeText.match(/\band\b/g);
        if (matchesAnd && matchesAnd.length > 3) {
            fillerCount += Math.floor(matchesAnd.length / 2);
        }

        let finalGrade = 2;
        let statusText = "";
        let themeColor = "#38bdf8"; 

        if (totalWords < 6 || matchedKeywordsCount === 0) {
            finalGrade = 2;
            statusText = "Off topic / too short";
            themeColor = "#f43f5e"; 
        } 
        else if (matchedKeywordsCount === 1 && totalWords < 15) {
            finalGrade = 4;
            statusText = "Irrelevant and too short";
            themeColor = "#fb923c"; 
        }
        else {
            if (matchedKeywordsCount === 1) finalGrade = 5;
            else if (matchedKeywordsCount === 2) finalGrade = 6;
            else if (matchedKeywordsCount === 3) finalGrade = 8;
            else if (matchedKeywordsCount >= 4) finalGrade = 10;

            if (fillerCount >= 4) {
                finalGrade = Math.max(4, finalGrade - 2); 
                statusText = "Need improve";
                themeColor = "#facc15"; 
            } 
            else if (finalGrade >= 6 && finalGrade <= 7) {
                statusText = "Moderate";
                themeColor = "#facc15"; 
            } 
            else if (finalGrade >= 8) {
                statusText = "Excellent";
                themeColor = "#4ade80"; 
            } 
            else {
                statusText = "Moderate";
                themeColor = "#facc15";
            }
        }

        scoreBox.style.borderColor = themeColor;
        scoreNum.innerText = `${finalGrade}/10`;
        scoreNum.style.color = themeColor;
        scoreNum.style.textShadow = `0 0 12px ${themeColor}66`;
        
        statusElement.innerText = statusText;
        statusElement.style.color = themeColor;
        statusElement.style.borderColor = themeColor;
        statusElement.style.backgroundColor = `${themeColor}1a`; 

    }, 800);
}
