<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Virtual Interview Practice</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{
background:linear-gradient(135deg,#0f172a,#1e293b);
color:#fff;
min-height:100vh;
display:flex;
flex-direction: column;
justify-content:center;
align-items:center;
padding:20px;
}

/* Main Heading Title Style at the top of the screen */
.main-title {
text-align: center;
font-size: 36px;
font-weight: bold;
margin-bottom: 30px;
color: #f8fafc;
text-shadow: 0 2px 4px rgba(0,0,0,0.3);
}

.wrapper{
width:100%;
max-width:1000px;
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-bottom: 40px; 
}

.box{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(10px);
padding:20px;
border-radius:20px;
position:relative;
display: flex;
flex-direction: column;
}

h2{
text-align:center;
margin-bottom:10px;
font-size:24px;
color: #e2e8f0;
}

#question{
font-size:20px;
margin:20px 0;
min-height:80px;
}

.timers{
margin:10px 0;
font-size:16px;
color:#93c5fd;
}

.score-display-text {
margin-top: 15px;
font-size: 18px;
font-weight: bold;
color: #f43f5e; 
display: none; 
}

.controls{
position:absolute;
bottom:15px;
right:15px;
display:flex;
gap:10px;
}

button{
padding:10px 12px;
border:none;
border-radius:10px;
cursor:pointer;
background:#2563eb;
color:#fff;
font-size:14px;
font-weight: bold;
}

button:hover{opacity:0.8}

video{
width:100%;
border-radius:15px;
margin-top:10px;
background: #000;
height: 220px;
}

.audio-visualizer{
display:flex;
justify-content:center;
align-items:flex-end;
height:60px;
gap:4px;
margin-top:15px;
margin-bottom: 15px;
}

.bar{
width:6px;
height:15px;
background:#22d3ee;
border-radius:5px;
transition: height 0.08s ease; /* Fast transition makes it follow real-time loudness seamlessly */
}

/* EXPECTED ANSWER CONTAINER STYLE */
.expected-answer-box {
background: rgba(15, 23, 42, 0.4);
border: 1px dashed #38bdf8;
border-radius: 12px;
padding: 12px;
margin-top: 10px;
margin-bottom: 45px; 
font-size: 14px;
line-height: 1.4;
color: #cbd5e1;
display: none;
}

/* STYLISH GREEN FEEDBACK BUTTON UNDER PLAYER */
.feedback-btn {
background: #10b981;
margin-top: 15px;
width: 100%;
padding: 12px;
font-size: 16px;
border-radius: 12px;
display: none; 
text-align: center;
}

/* CUSTOM CREDIT FOOTER STYLING */
.footer {
text-align: center;
font-size: 14px;
color: #94a3b8;
margin-top: 10px;
}
.footer a {
color: #38bdf8;
text-decoration: none;
font-weight: bold;
}
.footer a:hover {
text-decoration: underline;
}

</style>
</head>
<body>

<h1 class="main-title">Virtual Interview Practice</h1>

<div class="wrapper">

<div class="box">
<h2>UKVI Interview Question</h2>

<div id="question">Click Next to Start</div>

<div class="timers">
<div>Speak In: <span id="aiTimer">0</span></div>
<div>Preparation Time: <span id="recTimer">0</span></div>
<div>Speaking Time: <span id="liveTime">0:00</span></div>
<div id="scoreRow" class="score-display-text">Interview Score: <span id="scoreValue">--/10</span></div>
</div>

<div class="audio-visualizer" id="visualizer">
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
</div>

<div id="expectedAnswerBox" class="expected-answer-box"></div>

<div class="controls">
<button id="hintBtn" style="background: #0284c7; display: none;" onclick="toggleExpectedAnswer()">Expected Answer 💡</button>
<button onclick="nextFlow()">Next</button>
<button onclick="stopAll()">Stop</button>
</div>

</div>

<div class="box">
<h2>Camera View</h2>
<video id="preview" autoplay muted playsinline></video>
<video id="recorded" controls></video>
<button id="feedbackBtn" class="feedback-btn" onclick="generateFeedback()">Get Feedback & Score 🤖</button>
</div>

</div>

<div class="footer">
© 2026 | Designed & Coded by <a href="https://github.com/" target="_blank">Ashikur Rahman</a>
</div>

  {

  },

  },
  {

    keywords: ["role model", "inspires", "inspiration", "because", "achieved", "leader", "profession", "father", "scientist"],

let currentIndex = -1;
let stream;
let recorder;
let chunks=[];
let aiT, recT, liveT, visualLoop;
let audioContext, analyser, dataArray;
let totalRecordedSeconds = 0; 

let recognition;
let transcribedSpeech = "";
let isRecordingActive = false; // Flag tracking visual updates

window.addEventListener('DOMContentLoaded', () => {
    if (window.location.protocol === 'file:') {
        alert("⚠️ ENVIRONMENT ERROR: Web browsers block webcam recordings on local file links. Host on GitHub Pages for recording functionality.");
    }
    startCamera();
    initSpeechRecognition();
});

function initSpeechRecognition() {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SpeechRecognition) {
        recognition = new SpeechRecognition();
        recognition.continuous = true;
        recognition.interimResults = false;
        recognition.lang = 'en-US';

        recognition.onresult = (event) => {
            let currentResultIndex = event.resultIndex;
            let text = event.results[currentResultIndex][0].transcript;
            transcribedSpeech += text + " ";
        };
    }
}

async function startCamera(){
    try {
        stream = await navigator.mediaDevices.getUserMedia({video:true, audio:true});
        document.getElementById("preview").srcObject = stream;
        setupVisualizer(stream);
    } catch (err) {
        console.error("Access denied:", err);
        document.getElementById("question").innerText = "Camera/Mic error. Check system permissions.";
    }
}

function playBeep() {
    try {
        const ctx = audioContext || new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = ctx.createOscillator();
        const gainNode = ctx.createGain();
        oscillator.type = 'sine';
        oscillator.frequency.value = 600; 
        gainNode.gain.setValueAtTime(0.15, ctx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3); 
        oscillator.connect(gainNode);
        gainNode.connect(ctx.destination);
        oscillator.start();
        oscillator.stop(ctx.currentTime + 0.3); 
    } catch (e){}
}

function formatTime(totalSeconds) {
    const minutes = Math.floor(totalSeconds / 60);
    const seconds = totalSeconds % 60;
    return minutes + ":" + (seconds < 10 ? "0" : "") + seconds;
}

function speak(text){
    window.speechSynthesis.cancel(); 
    let s = new SpeechSynthesisUtterance(text);
    s.rate = 1.0; 
    window.speechSynthesis.speak(s);
    return new Promise(r => { s.onend = r; });
}

function timer(id, sec, cb){
    let timerId = id == "ai" ? "aiTimer" : "recTimer";
    clearInterval(window[id + "T"]);
    document.getElementById(timerId).innerText = sec;
    
    window[id + "T"] = setInterval(() => {
        sec--;
        document.getElementById(timerId).innerText = sec;
        if(sec <= 0){
            clearInterval(window[id + "T"]);
            if(cb) cb();
        }
    }, 1000);
}

function startRecord(){
    if (!stream) return;
    playBeep();
    
    recorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
    chunks = [];
    transcribedSpeech = "";
    isRecordingActive = true; // Turn visual audio updates ON
    
    if (recognition) { try { recognition.start(); } catch(e){} }
    
    recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
    
    recorder.onstop = () => {
        isRecordingActive = false; // Turn visual audio updates OFF
        resetVisualizerBars();     // Make waves completely flat instantly
        
        let blob = new Blob(chunks, {type: "video/webm"});
        let recordedVideo = document.getElementById("recorded");
        recordedVideo.src = URL.createObjectURL(blob);
        recordedVideo.load();
        
        if (totalRecordedSeconds > 0) {
            recordedVideo.addEventListener('loadedmetadata', function() {
                Object.defineProperty(recordedVideo, 'duration', { value: totalRecordedSeconds, configurable: true });
            }, { once: true });
        }
        document.getElementById("feedbackBtn").style.display = "block";
    };
    recorder.start();
}

function setupVisualizer(mediaStream) {
    if (audioContext) audioContext.close();
    audioContext = new (window.AudioContext || window.webkitAudioContext)();
    const source = audioContext.createMediaStreamSource(mediaStream);
    analyser = audioContext.createAnalyser();
    analyser.fftSize = 32; 
    source.connect(analyser);
    
    const bufferLength = analyser.frequencyBinCount;
    dataArray = new Uint8Array(bufferLength);
    const bars = document.querySelectorAll('.bar');

    function draw() {
        visualLoop = requestAnimationFrame(draw);
        
        if (isRecordingActive) {
            analyser.getByteFrequencyData(dataArray);
            bars.forEach((bar, index) => {
                let value = dataArray[index] || 0;
                // Waves animate up based directly on your mic input loudness
                let height = Math.max(15, (value / 255) * 60); 
                bar.style.height = height + 'px';
            });
        }
    }
    draw();
}

// Reset waves back to small resting size when recording finishes
function resetVisualizerBars() {
    const bars = document.querySelectorAll('.bar');
    bars.forEach(bar => {
        bar.style.height = '15px';
    });
}

async function nextFlow(){
    let recordedVideo = document.getElementById("recorded");
    recordedVideo.pause(); 
    recordedVideo.src = ""; 
    
    document.getElementById("feedbackBtn").style.display = "none";
    document.getElementById("scoreRow").style.display = "none";
    document.getElementById("scoreValue").innerText = "--/10";
    
    document.getElementById("expectedAnswerBox").style.display = "none";
    document.getElementById("hintBtn").style.display = "inline-block";

    if(recorder && recorder.state != "inactive") recorder.stop();
    if(recognition) { try { recognition.stop(); } catch(e){} }

    clearInterval(liveT);
    totalRecordedSeconds = 0;
    document.getElementById("liveTime").innerText = "0:00"; 
    document.getElementById("recTimer").innerText = "0";

    currentIndex = Math.floor(Math.random() * interviewData.length);
    let targetData = interviewData[currentIndex];
    
    document.getElementById("question").innerText = targetData.question;
    document.getElementById("expectedAnswerBox").innerText = targetData.hint;

    let aiCount = 3;
    timer("ai", aiCount, async () => {
        await speak(targetData.question);
        let recCount = 3;
        timer("rec", recCount, () => {
            startRecord();
            startLiveTimer();
        });
    });
}

function startLiveTimer(){
    clearInterval(liveT);
    let live = 0;
    liveT = setInterval(() => {
        live++;
        totalRecordedSeconds = live; 
        document.getElementById("liveTime").innerText = formatTime(live); 
    }, 1000);
}

function toggleExpectedAnswer() {
    let box = document.getElementById("expectedAnswerBox");
    if(box.style.display === "block") {
        box.style.display = "none";
    } else {
        box.style.display = "block";
    }
}

function stopAll(){
    if(recorder && recorder.state != "inactive") recorder.stop();
    if (recognition) { try { recognition.stop(); } catch(e){} }
    clearInterval(aiT); clearInterval(recT); clearInterval(liveT);
    isRecordingActive = false;
    resetVisualizerBars();
}

async function generateFeedback() {
    if (recognition) { try { recognition.stop(); } catch(e){} }

    let safeText = transcribedSpeech.trim().toLowerCase();
    document.getElementById("scoreRow").style.display = "block";
    document.getElementById("scoreValue").innerText = "Analyzing Answer Topic...";

    let currentQuestionData = interviewData[currentIndex];
    let targetKeywords = currentQuestionData ? currentQuestionData.keywords : [];

    if (window.ai && window.ai.createTextSession) {
        try {
            const session = await window.ai.createTextSession();
            const rawPrompt = `Verify this UKVI answer out of 10.
            Question: "${currentQuestionData.question}"
            Answer given: "${safeText}"
            Strict Context Rule: If the user avoids the question or talks about unrelated things, score 1/10.
            Return ONLY the number grade string like "8/10". No extra text.`;
            
            const aiResponse = await session.prompt(rawPrompt);
            let scoreMatch = aiResponse.match(/(\d+)\s*\/\s*10/) || aiResponse.match(/\b([1-9]|10)\b/);
            if(scoreMatch) {
                document.getElementById("scoreValue").innerText = `${scoreMatch[1]}/10`;
                return;
            }
        } catch(aiError) {
            console.error("Local window.ai engine error:", aiError);
        }
    }

    // FALLBACK ENGINE FIX: Target-Mapped Evaluator
    setTimeout(() => {
        let totalWords = safeText.split(" ").length;
        let matchedKeywordsCount = 0;

        targetKeywords.forEach(keyword => {
            if (safeText.includes(keyword)) {
                matchedKeywordsCount++;
            }
        });

        let finalGrade = 2; 

        if (totalWords < 6 || matchedKeywordsCount === 0) {
            document.getElementById("scoreValue").innerText = "2/10 (Off-Topic/Too Short)";
            return;
        }

        if (matchedKeywordsCount === 1) finalGrade = 4;
        else if (matchedKeywordsCount === 2) finalGrade = 6;
        else if (matchedKeywordsCount === 3) finalGrade = 8;
        else if (matchedKeywordsCount >= 4) finalGrade = 10;

        if (totalWords < 20 && finalGrade > 6) {
            finalGrade = 6;
        }

        document.getElementById("scoreValue").innerText = `${finalGrade}/10`;
    }, 800);
}

</script>
